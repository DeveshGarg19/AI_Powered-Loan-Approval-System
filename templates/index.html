<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoanIQ — AI Loan Approval System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
      --border: #2a2a38; --accent: #6c63ff; --text: #e8e8f0; --muted: #6b6b80;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    .app {
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(108,99,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(255,107,107,0.08) 0%, transparent 60%),
        var(--bg);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem; border-bottom: 1px solid var(--border);
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); background: rgba(10,10,15,0.85);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, #6c63ff, #ff6b6b);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-badge {
      padding: 0.4rem 1rem; background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3); border-radius: 100px;
      font-size: 0.8rem; color: #a89fff; letter-spacing: 1px; text-transform: uppercase;
    }

    /* HERO */
    .hero { text-align: center; padding: 4rem 2rem 2rem; }
    .hero h1 {
      font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 800; letter-spacing: -2px; margin-bottom: 1rem; line-height: 1.1;
    }
    .hero h1 span {
      background: linear-gradient(135deg, #6c63ff, #ff6b6b);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { color: var(--muted); font-size: 1rem; margin-bottom: 2rem; }

    /* FORM */
    .form-wrap { max-width: 960px; margin: 0 auto; padding: 0 2rem 4rem; }
    .form-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem;
    }
    .section-title {
      font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 1.5rem;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.2rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.78rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    input, select {
      padding: 0.75rem 1rem; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; outline: none; transition: all 0.2s; width: 100%;
    }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
    select option { background: var(--surface2); }
    .submit-btn {
      width: 100%; padding: 1.1rem;
      background: linear-gradient(135deg, #6c63ff, #8b84ff);
      border: none; border-radius: 12px; color: white;
      font-size: 1.05rem; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.2s;
      box-shadow: 0 8px 32px rgba(108,99,255,0.3); margin-top: 1rem;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(108,99,255,0.4); }
    .error-box {
      background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3);
      border-radius: 10px; padding: 1rem; color: #ff4d6d; margin-bottom: 1rem;
    }
    @media (max-width: 700px) { .form-grid { grid-template-columns: 1fr; } nav { padding: 1rem; } }
  </style>
</head>
<body>
<div class="app">
  <nav>
    <div class="logo">LoanIQ</div>
    <div class="nav-badge">🤖 AI-Powered</div>
  </nav>

  <div class="hero">
    <h1>Know Your Loan<br/><span>Outcome Instantly</span></h1>
    <p>AI-powered loan approval prediction with full transparency on every decision.</p>
  </div>

  <div class="form-wrap">
    {% if error %}
    <div class="error-box">⚠️ Error: {{ error }}</div>
    {% endif %}

    <form action="/predict" method="POST">

      <div class="form-section">
        <div class="section-title">👤 Personal Information</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Gender</label>
            <select name="Gender" title="Gender">
              <option>Male</option><option>Female</option>
            </select>
          </div>
          <div class="form-group">
            <label>Age</label>
            <input type="number" name="Age" min="18" max="80" value="30" placeholder="Enter your age" required/>
          </div>
          <div class="form-group">
            <label>Marital Status</label>
            <select name="Marital_Status" title="Marital Status">
              <option>Married</option><option>Single</option>
            </select>
          </div>
          <div class="form-group">
            <label>Dependents</label>
            <input type="number" name="Dependents" min="0" max="10" value="0" placeholder="Number of dependents" required/>
          </div>
          <div class="form-group">
            <label>Education Level</label>
            <select name="Education_Level" title="Education Level">
              <option>Graduate</option><option>Not Graduate</option>
            </select>
          </div>
          <div class="form-group">
            <label>Property Area</label>
            <select name="Property_Area" title="Property Area">
              <option>Urban</option><option>Semiurban</option><option>Rural</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="section-title">💼 Employment Details</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Employment Status</label>
            <select name="Employment_Status" title="Employment Status">
              <option>Salaried</option><option>Self-employed</option><option>Unemployed</option>
            </select>
          </div>
          <div class="form-group">
            <label>Employer Category</label>
            <select name="Employer_Category" title="Employer Category">
              <option>MNC</option><option>Government</option><option>Private</option><option>Unemployed</option>
            </select>
          </div>
          <div class="form-group">
            <label>Applicant Income (₹)</label>
            <input type="number" name="Applicant_Income" min="0" value="50000" placeholder="Annual income" required/>
          </div>
          <div class="form-group">
            <label>Savings (₹)</label>
            <input type="number" name="Savings" min="0" value="10000" placeholder="Total savings" required/>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="section-title">🏦 Loan Details</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Loan Amount (₹)</label>
            <input type="number" name="Loan_Amount" min="0" value="200000" placeholder="Loan amount" required/>
          </div>
          <div class="form-group">
            <label>Loan Term (months)</label>
            <input type="number" name="Loan_Term" min="12" max="360" value="30" placeholder="Loan duration" required/>
          </div>
          <div class="form-group">
            <label>Loan Purpose</label>
            <select name="Loan_Purpose" title="Loan Purpose">
              <option>Personal</option><option>Education</option><option>Home</option><option>Car</option>
            </select>
          </div>
          <!-- <div class="form-group">
            <label>Property Area</label>
            <select name="Property_Area" title="Property Area">
              <option>Urban</option><option>Semiurban</option><option>Rural</option>
            </select>
          </div> -->
        </div>
      </div>

      <div class="form-section">
        <div class="section-title">📊 Financial Profile</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Credit Score</label>
            <input type="number" name="Credit_Score" min="300" max="900" value="750" placeholder="Credit score" required/>
          </div>
          <div class="form-group">
            <label>DTI Ratio (0.0 – 1.0)</label>
            <input type="number" name="DTI_Ratio" min="0" max="1" step="0.01" value="0.2" placeholder="DTI ratio" required/>
          </div>
        </div>
      </div>

      <button type="submit" class="submit-btn">🔍 Analyze My Application →</button>
    </form>
  </div>
</div>
</body>
</html>
