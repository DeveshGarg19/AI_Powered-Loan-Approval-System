<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoanIQ — Verify OTP</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #e8e8f0; font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(108,99,255,0.15), transparent 70%), #0a0a0f;
    }
    .card { background: #111118; border: 1px solid #2a2a38; border-radius: 20px; padding: 3rem 2.5rem; width: 100%; max-width: 420px; text-align: center; }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(135deg, #6c63ff, #ff6b6b);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;
    }
    .icon { font-size: 3rem; margin: 1rem 0; }
    .subtitle { color: #6b6b80; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .email-text { color: #a89fff; font-weight: 600; margin-bottom: 2rem; font-size: 0.95rem; }
    input { width: 100%; padding: 1rem; background: #1a1a24; border: 1px solid #2a2a38;
      border-radius: 10px; color: #e8e8f0; font-family: 'DM Sans', sans-serif;
      font-size: 1.5rem; text-align: center; letter-spacing: 10px; outline: none; margin-bottom: 1.2rem;
    }
    input:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
    .btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #6c63ff, #8b84ff);
      border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3);
      border-radius: 10px; padding: 0.8rem 1rem; color: #ff4d6d; font-size: 0.88rem; margin-bottom: 1rem;
    }
    .note { color: #6b6b80; font-size: 0.82rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏦 LoanIQ</div>
    <div class="icon">📧</div>
    <div class="subtitle">We sent a 6-digit OTP to</div>
    <div class="email-text">{{ email }}</div>

    {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}

    <form method="POST">
      <input type="text" name="otp" maxlength="6" placeholder="000000" required/>
      <button type="submit" class="btn">Verify OTP →</button>
    </form>
    <div class="note">OTP is valid for 10 minutes. Check your spam folder if not received.</div>
  </div>
</body>
</html>
