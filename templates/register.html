<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoanIQ — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #e8e8f0; font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(108,99,255,0.15), transparent 70%), #0a0a0f;
    }
    .card { background: #111118; border: 1px solid #2a2a38; border-radius: 20px; padding: 3rem 2.5rem; width: 100%; max-width: 420px; }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; text-align: center;
      background: linear-gradient(135deg, #6c63ff, #ff6b6b);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;
    }
    .subtitle { text-align: center; color: #6b6b80; font-size: 0.9rem; margin-bottom: 2rem; }
    label { font-size: 0.78rem; font-weight: 500; color: #6b6b80; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 0.4rem; }
    input { width: 100%; padding: 0.8rem 1rem; background: #1a1a24; border: 1px solid #2a2a38;
      border-radius: 10px; color: #e8e8f0; font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; outline: none; margin-bottom: 1.2rem; transition: all 0.2s;
    }
    input:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
    .btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #6c63ff, #8b84ff);
      border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .links { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: #6b6b80; }
    .links a { color: #a89fff; text-decoration: none; }
    .error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3);
      border-radius: 10px; padding: 0.8rem 1rem; color: #ff4d6d; font-size: 0.88rem; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏦 LoanIQ</div>
    <div class="subtitle">Create your account</div>

    {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}

    <form method="POST">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="John Doe" required/>
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required/>
      <label>Password</label>
      <input type="password" name="password" placeholder="Create a strong password" required/>
      <button type="submit" class="btn">Create Account →</button>
    </form>

    <div class="links">Already have an account? <a href="/login">Sign in</a></div>
  </div>
</body>
</html>
