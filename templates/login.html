<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoanIQ — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #e8e8f0; font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(108,99,255,0.15), transparent 70%), #0a0a0f;
    }
    .card {
      background: #111118; border: 1px solid #2a2a38; border-radius: 20px;
      padding: 3rem 2.5rem; width: 100%; max-width: 420px;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; text-align: center;
      background: linear-gradient(135deg, #6c63ff, #ff6b6b);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;
    }
    .subtitle { text-align: center; color: #6b6b80; font-size: 0.9rem; margin-bottom: 2rem; }
    label { font-size: 0.78rem; font-weight: 500; color: #6b6b80; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 0.4rem; }
    input { width: 100%; padding: 0.8rem 1rem; background: #1a1a24; border: 1px solid #2a2a38;
      border-radius: 10px; color: #e8e8f0; font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; outline: none; margin-bottom: 1.2rem; transition: all 0.2s;
    }
    input:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
    .btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, #6c63ff, #8b84ff);
      border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 0.5rem; transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.4); }
    .links { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: #6b6b80; }
    .links a { color: #a89fff; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3);
      border-radius: 10px; padding: 0.8rem 1rem; color: #ff4d6d; font-size: 0.88rem; margin-bottom: 1rem;
    }
    .success { background: rgba(0,214,143,0.1); border: 1px solid rgba(0,214,143,0.3);
      border-radius: 10px; padding: 0.8rem 1rem; color: #00d68f; font-size: 0.88rem; margin-bottom: 1rem;
    }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; }
    .divider hr { flex: 1; border: none; border-top: 1px solid #2a2a38; }
    .divider span { color: #6b6b80; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏦 LoanIQ</div>
    <div class="subtitle">Sign in to your account</div>

    {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
    {% if success %}<div class="success">✅ {{ success }}</div>{% endif %}

    <form method="POST">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required/>
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required/>
      <button type="submit" class="btn">Sign In →</button>
    </form>

    <div class="links">
      <a href="/forgot_password">Forgot password?</a>
      <div class="divider"><hr/><span>or</span><hr/></div>
      Don't have an account? <a href="/register">Register here</a>
    </div>
  </div>
</body>
</html>
